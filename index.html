<!DOCTYPE html>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),

<body class="bg-gray-50 font-sans text-gray-900">

    <nav class="flex items-center justify-between px-6 py-4 bg-white shadow-md sticky top-0 z-50">

        <div class="flex items-center gap-3">
            <a href="tel:9422231321" class="bg-black text-white px-4 py-2 rounded-full text-xs font-bold flex items-center gap-2">
                <i class="fas fa-phone-alt"></i> CALL
            </a>
            <a href="#booking" class="bg-green-600 text-white px-4 py-2 rounded-full text-xs font-bold">BOOK</a>
        </div>
    </nav>

    <header class="hero-bg h-[70vh] flex flex-col items-center justify-center text-center text-white px-4">

        <p class="text-lg md:text-xl mb-8 max-w-xl text-gray-300">Premium Football & Box Cricket in Kishkinda Nagar, Kothrud.</p>
        <div class="flex flex-col sm:flex-row gap-4 w-full max-w-md">
            <a href="#booking" class="bg-green-600 text-white text-lg font-bold py-4 px-8 rounded-xl shadow-xl">START BOOKING</a>
            <a href="tel:9422231321" class="bg-white text-black text-lg font-bold py-4 px-8 rounded-xl shadow-xl flex items-center justify-center gap-3">

    <section id="gallery" class="py-16 bg-white px-6">
        <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/17442131665601671848_1" class="rounded-xl h-64 w-full object-cover shadow-md" alt="Turf 1">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/17442131665601671848_2" class="rounded-xl h-64 w-full object-cover shadow-md" alt="Turf 2">

            <div class="bg-green-600 p-8 text-white text-center">

                <p class="opacity-90">Open Daily: 6:00 AM - 11:59 PM</p>
            </div>
            
            <form class="p-8 md:p-12 grid md:grid-cols-2 gap-8">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Select Date</label>
                    <input type="date" class="w-full border-b-2 border-gray-100 p-3 focus:border-green-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Select Time</label>
                    <select class="w-full border-b-2 border-gray-100 p-3 focus:border-green-500 outline-none transition">
                        <option>06:00 AM - 07:00 AM</option>
                        <option>07:00 AM - 08:00 AM</option>
                        <option>08:00 AM - 09:00 AM</option>
                        <option>09:00 AM - 10:00 AM</option>
                        <option>10:00 AM - 11:00 AM</option>
                        <option>11:00 AM - 12:00 PM</option>
                        <option>12:00 PM - 01:00 PM</option>
                        <option>01:00 PM - 02:00 PM</option>
                        <option>02:00 PM - 03:00 PM</option>
                        <option>03:00 PM - 04:00 PM</option>
                        <option>04:00 PM - 05:00 PM</option>
                        <option>05:00 PM - 06:00 PM</option>
                        <option>06:00 PM - 07:00 PM</option>
                        <option>07:00 PM - 08:00 PM</option>
                        <option>08:00 PM - 09:00 PM</option>
                        <option>09:00 PM - 10:00 PM</option>
                        <option>10:00 PM - 11:00 PM</option>
                        <option>11:00 PM - 11:59 PM</option>
                    </select>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Select Sport</label>
                    <div class="flex gap-6 pt-2">
                        <label class="flex items-center gap-2 cursor-pointer font-bold">
                            <input type="radio" name="sport" class="w-5 h-5 accent-green-600" checked> Football
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer font-bold">
                            <input type="radio" name="sport" class="w-5 h-5 accent-green-600"> Box Cricket
                        </label>
                    </div>
                </div>

                <div class="md:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
                    <a href="https://wa.me/919422231321?text=Hi! I want to book a slot for my match." class="bg-green-600 text-white font-bold py-5 rounded-xl text-center shadow-lg hover:bg-green-700 transition flex items-center justify-center gap-3">
                        <i class="fab fa-whatsapp text-2xl"></i> WHATSAPP BOOKING
                    </a>
                    <a href="tel:9422231321" class="bg-black text-white font-bold py-5 rounded-xl text-center shadow-lg hover:bg-gray-800 transition flex items-center justify-center gap-3">
                        <i class="fas fa-phone-alt"></i> CALL TO CONFIRM
                    </a>
                </div>
            </form>
        </div>
    </section>

    <section id="contact" class="py-16 bg-white px-6">
        <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-12">
            <div>
                <h3 class="text-3xl font-black mb-6 uppercase">Find Us</h3>
                <p class="text-gray-600 mb-4 font-bold">Kishkinda Nagar, Kothrud, Pune - 411038</p>
                <p class="text-green-600 font-black text-2xl">+91 94222 31321</p>
            </div>
            <div class="h-64 rounded-3xl overflow-hidden shadow-xl border">
                <iframe src="http://googleusercontent.com/maps.google.com/7" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>

    <div class="fixed bottom-6 left-6 right-6 flex justify-between items-center z-50 md:hidden">
        <a href="tel:9422231321" class="bg-black text-white w-14 h-14 rounded-full flex items-center justify-center text-xl shadow-2xl border-2 border-white">
            <i class="fas fa-phone-alt"></i>
        </a>
        <a href="https://wa.me/919422231321" class="bg-green-500 text-white w-14 h-14 rounded-full flex items-center justify-center text-2xl shadow-2xl border-2 border-white">
            <i class="fab fa-whatsapp"></i>
